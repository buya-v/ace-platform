apiVersion: v1
kind: Service
metadata:
  name: margin-engine
  namespace: ace-exchange
  labels:
    app.kubernetes.io/name: margin-engine
    app.kubernetes.io/part-of: ace-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: margin-engine
  ports:
    - name: grpc
      port: 50053
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8083
      targetPort: health
      protocol: TCP
