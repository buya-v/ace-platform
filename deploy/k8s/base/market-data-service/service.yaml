apiVersion: v1
kind: Service
metadata:
  name: market-data-service
  namespace: garudax-services
  labels:
    app.kubernetes.io/name: market-data-service
    app.kubernetes.io/part-of: garudax-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: market-data-service
  ports:
    - name: grpc
      port: 50057
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8087
      targetPort: health
      protocol: TCP
