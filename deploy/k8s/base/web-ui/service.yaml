apiVersion: v1
kind: Service
metadata:
  name: web-ui
  namespace: garudax-services
  labels:
    app.kubernetes.io/name: web-ui
    app.kubernetes.io/part-of: garudax-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: web-ui
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
