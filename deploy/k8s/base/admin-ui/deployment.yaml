apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-ui
  namespace: garudax-services
  labels:
    app.kubernetes.io/name: admin-ui
    app.kubernetes.io/part-of: garudax-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: admin-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: admin-ui
        app.kubernetes.io/part-of: garudax-platform
    spec:
      containers:
        - name: admin-ui
          image: garudax-platform/admin-ui:latest
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          env:
            - name: API_BASE_URL
              value: "http://gateway.garudax-services.svc.cluster.local:8080"
