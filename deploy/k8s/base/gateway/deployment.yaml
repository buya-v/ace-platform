apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: ace-services
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/part-of: ace-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gateway
        app.kubernetes.io/part-of: ace-platform
    spec:
      serviceAccountName: gateway
      terminationGracePeriodSeconds: 30
      containers:
        - name: gateway
          image: ace-platform/gateway:latest
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: health
              containerPort: 8090
              protocol: TCP
          envFrom:
            - configMapRef:
                name: service-discovery
            - secretRef:
                name: ace-jwt-signing-key
          readinessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
