---
# ── Let's Encrypt ClusterIssuer (production) ────────────────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@asla.mn
    privateKeySecretRef:
      name: letsencrypt-prod-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ── Let's Encrypt ClusterIssuer (staging — for testing) ─────────────────────
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: admin@asla.mn
    privateKeySecretRef:
      name: letsencrypt-staging-key
    solvers:
      - http01:
          ingress:
            class: nginx
---
# ── Certificate for garudax.asla.mn ─────────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: garudax-asla-mn-cert
  namespace: garudax
spec:
  secretName: garudax-asla-mn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - garudax.asla.mn
---
# ── Certificate for admin.garudax.asla.mn ───────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: admin-garudax-asla-mn-cert
  namespace: garudax
spec:
  secretName: admin-garudax-asla-mn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - admin.garudax.asla.mn
---
# ── Certificate for trade.garudax.asla.mn ───────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: trade-garudax-asla-mn-cert
  namespace: garudax
spec:
  secretName: trade-garudax-asla-mn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - trade.garudax.asla.mn
---
# ── Certificate for demo.garudax.asla.mn ────────────────────────────────────────
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: demo-garudax-asla-mn-cert
  namespace: garudax
spec:
  secretName: demo-garudax-asla-mn-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - demo.garudax.asla.mn
