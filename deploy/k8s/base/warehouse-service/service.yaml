apiVersion: v1
kind: Service
metadata:
  name: warehouse-service
  namespace: garudax-services
  labels:
    app.kubernetes.io/name: warehouse-service
    app.kubernetes.io/part-of: garudax-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: warehouse-service
  ports:
    - name: grpc
      port: 50058
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8088
      targetPort: health
      protocol: TCP
