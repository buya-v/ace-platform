apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: garudax-infra
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: garudax-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
