apiVersion: v1
kind: Service
metadata:
  name: matching-engine
  namespace: ace-exchange
  labels:
    app.kubernetes.io/name: matching-engine
    app.kubernetes.io/part-of: ace-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: matching-engine
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8081
      targetPort: health
      protocol: TCP
