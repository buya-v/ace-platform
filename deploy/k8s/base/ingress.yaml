apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ace-platform-ingress
  namespace: ace
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/websocket-services: "gateway"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - ace.asla.mn
      secretName: ace-asla-mn-tls
    - hosts:
        - demo.ace.asla.mn
      secretName: demo-ace-asla-mn-tls
  rules:
    # ── Main platform ──────────────────────────────────────────────────
    - host: ace.asla.mn
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /admin
            pathType: Prefix
            backend:
              service:
                name: admin-ui
                port:
                  number: 3001
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: gateway
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-ui
                port:
                  number: 3000
    # ── Demo runner ────────────────────────────────────────────────────
    - host: demo.ace.asla.mn
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: demo-runner
                port:
                  number: 3002
