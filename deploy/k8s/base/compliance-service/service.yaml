apiVersion: v1
kind: Service
metadata:
  name: compliance-service
  namespace: ace-services
  labels:
    app.kubernetes.io/name: compliance-service
    app.kubernetes.io/part-of: ace-platform
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: compliance-service
  ports:
    - name: grpc
      port: 50056
      targetPort: grpc
      protocol: TCP
    - name: health
      port: 8086
      targetPort: health
      protocol: TCP
