# Karpenter NodePool for exchange-core burst workloads
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: exchange-core-burst
spec:
  template:
    metadata:
      labels:
        garudax-platform/node-role: exchange-core
        karpenter.sh/provisioner: exchange-core-burst
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["c5.2xlarge", "c5.4xlarge", "c5a.2xlarge", "c5a.4xlarge"]
      taints:
        - key: garudax-platform/exchange-core
          value: "true"
          effect: NoSchedule
      nodeClassRef:
        name: default
  limits:
    cpu: "128"
    memory: 256Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
# Karpenter NodePool for general app workloads
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: app-general-burst
spec:
  template:
    metadata:
      labels:
        garudax-platform/node-role: app-general
        karpenter.sh/provisioner: app-general-burst
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["m5.xlarge", "m5.2xlarge", "m5a.xlarge", "m5a.2xlarge"]
      nodeClassRef:
        name: default
  limits:
    cpu: "256"
    memory: 512Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
# Karpenter NodePool for data pipeline workloads
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: data-pipeline-burst
spec:
  template:
    metadata:
      labels:
        garudax-platform/node-role: data-pipeline
        karpenter.sh/provisioner: data-pipeline-burst
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand", "spot"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["r5.xlarge", "r5.2xlarge", "r5a.xlarge", "r5a.2xlarge"]
      taints:
        - key: garudax-platform/data-pipeline
          value: "true"
          effect: NoSchedule
      nodeClassRef:
        name: default
  limits:
    cpu: "128"
    memory: 512Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
# EC2NodeClass shared by all Karpenter NodePools
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: "${CLUSTER_NAME}"
  instanceProfile: "${KARPENTER_INSTANCE_PROFILE}"
  tags:
    Project: garudax-platform
    ManagedBy: karpenter
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 100Gi
        volumeType: gp3
        iops: 3000
        throughput: 125
        encrypted: true
