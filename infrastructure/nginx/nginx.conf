upstream gateway_backend {
    server gateway:8080;
}

upstream web_ui_backend {
    server web-ui:3000;
}

upstream admin_ui_backend {
    server admin-ui:3001;
}

upstream demo_runner_backend {
    server demo-runner:3002;
}

# ── Main platform: ace.asla.mn ──────────────────────────────────────────────
server {
    listen 80;
    server_name ace.asla.mn;

    # Redirect HTTP to HTTPS in production (uncomment when TLS is configured)
    # return 301 https://$host$request_uri;

    # ── Proxy headers ────────────────────────────────────────────────────
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ── API routes ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://gateway_backend;
    }

    # ── WebSocket routes ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Admin UI ─────────────────────────────────────────────────────────
    location /admin {
        proxy_pass http://admin_ui_backend;
    }

    # ── Health check (gateway) ───────────────────────────────────────────
    location /healthz {
        proxy_pass http://gateway_backend;
    }

    # ── Default: Web UI ──────────────────────────────────────────────────
    location / {
        proxy_pass http://web_ui_backend;
    }
}

