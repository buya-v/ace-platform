syntax = "proto3";

package ace.exchange.v1;

option go_package = "github.com/ace-platform/matching-engine/proto/exchange/v1;exchangev1";

import "google/protobuf/timestamp.proto";

// ---------------------------------------------------------------------------
// Enums
// ---------------------------------------------------------------------------

enum Side {
  SIDE_UNSPECIFIED = 0;
  SIDE_BUY = 1;
  SIDE_SELL = 2;
}

enum OrderType {
  ORDER_TYPE_UNSPECIFIED = 0;
  ORDER_TYPE_LIMIT = 1;
  ORDER_TYPE_MARKET = 2;
  ORDER_TYPE_STOP_LIMIT = 3;
  ORDER_TYPE_STOP_MARKET = 4;
}

enum TimeInForce {
  TIME_IN_FORCE_UNSPECIFIED = 0;
  TIME_IN_FORCE_DAY = 1;
  TIME_IN_FORCE_GTC = 2;
  TIME_IN_FORCE_GTD = 3;
  TIME_IN_FORCE_IOC = 4;
  TIME_IN_FORCE_FOK = 5;
}

enum OrderStatus {
  ORDER_STATUS_UNSPECIFIED = 0;
  ORDER_STATUS_NEW = 1;
  ORDER_STATUS_PARTIALLY_FILLED = 2;
  ORDER_STATUS_FILLED = 3;
  ORDER_STATUS_CANCELLED = 4;
  ORDER_STATUS_REJECTED = 5;
  ORDER_STATUS_EXPIRED = 6;
  ORDER_STATUS_PENDING_NEW = 7;
}

enum ExecType {
  EXEC_TYPE_UNSPECIFIED = 0;
  EXEC_TYPE_NEW = 1;
  EXEC_TYPE_PARTIAL_FILL = 2;
  EXEC_TYPE_FILL = 3;
  EXEC_TYPE_CANCELLED = 4;
  EXEC_TYPE_REJECTED = 5;
  EXEC_TYPE_EXPIRED = 6;
  EXEC_TYPE_TRADE_BUST = 7;
}

enum TradeType {
  TRADE_TYPE_UNSPECIFIED = 0;
  TRADE_TYPE_CONTINUOUS = 1;
  TRADE_TYPE_AUCTION = 2;
  TRADE_TYPE_BLOCK = 3;
  TRADE_TYPE_BUST = 4;
  TRADE_TYPE_CORRECTION = 5;
}

enum BookState {
  BOOK_STATE_UNSPECIFIED = 0;
  BOOK_STATE_PREOPEN = 1;
  BOOK_STATE_AUCTION = 2;
  BOOK_STATE_CONTINUOUS = 3;
  BOOK_STATE_HALTED = 4;
  BOOK_STATE_CLOSED = 5;
}

enum STPMode {
  STP_MODE_UNSPECIFIED = 0;
  STP_MODE_CANCEL_NEWEST = 1;
  STP_MODE_CANCEL_OLDEST = 2;
  STP_MODE_CANCEL_BOTH = 3;
}

// ---------------------------------------------------------------------------
// Order Service
// ---------------------------------------------------------------------------

service OrderService {
  // Submit a new order to the matching engine.
  rpc SubmitOrder(SubmitOrderRequest) returns (ExecutionReport);

  // Cancel an open order.
  rpc CancelOrder(CancelOrderRequest) returns (ExecutionReport);

  // Cancel all open orders for an account, optionally filtered by instrument.
  rpc CancelAllOrders(CancelAllOrdersRequest) returns (CancelAllOrdersResponse);

  // Modify price and/or quantity of an open order (cancel-replace semantics).
  rpc ModifyOrder(ModifyOrderRequest) returns (ExecutionReport);

  // Query a single order by ID.
  rpc GetOrder(GetOrderRequest) returns (OrderDetail);

  // List open orders for an account.
  rpc GetOpenOrders(GetOpenOrdersRequest) returns (GetOpenOrdersResponse);
}

// ---------------------------------------------------------------------------
// Market Data Service
// ---------------------------------------------------------------------------

service MarketDataService {
  // Get an L2 (aggregated) order book snapshot.
  rpc GetOrderBook(GetOrderBookRequest) returns (OrderBookSnapshot);

  // Get an L3 (individual orders) order book snapshot.
  rpc GetOrderBookL3(GetOrderBookRequest) returns (OrderBookSnapshotL3);

  // Stream real-time trades for an instrument.
  rpc StreamTrades(StreamTradesRequest) returns (stream Trade);

  // Stream incremental order book updates for an instrument.
  rpc StreamOrderBook(StreamOrderBookRequest) returns (stream OrderBookUpdate);

  // Get the most recent trade for an instrument.
  rpc GetLastTrade(GetLastTradeRequest) returns (Trade);
}

// ---------------------------------------------------------------------------
// Admin Service
// ---------------------------------------------------------------------------

service AdminService {
  // Manually halt trading for an instrument.
  rpc HaltInstrument(HaltInstrumentRequest) returns (HaltInstrumentResponse);

  // Resume trading after a halt (triggers volatility auction).
  rpc ResumeInstrument(ResumeInstrumentRequest) returns (ResumeInstrumentResponse);

  // Bust an erroneous trade.
  rpc BustTrade(BustTradeRequest) returns (Trade);

  // Update circuit breaker configuration for an instrument.
  rpc SetCircuitBreaker(SetCircuitBreakerRequest) returns (CircuitBreakerConfig);

  // Suspend a participant from trading.
  rpc DisableParticipant(DisableParticipantRequest) returns (DisableParticipantResponse);

  // Mass cancel all orders for an instrument or participant.
  rpc MassCancel(MassCancelRequest) returns (MassCancelResponse);
}

// ---------------------------------------------------------------------------
// Order Messages
// ---------------------------------------------------------------------------

message SubmitOrderRequest {
  string client_order_id = 1;
  string instrument_id = 2;         // UUID
  Side side = 3;
  OrderType order_type = 4;
  TimeInForce time_in_force = 5;
  string price = 6;                  // decimal string; empty for MARKET
  string stop_price = 7;            // decimal string; empty unless STOP_*
  uint64 quantity = 8;               // in lots
  google.protobuf.Timestamp expire_at = 9;   // required for GTD
  STPMode stp_mode = 10;
  string account_id = 11;           // UUID — trading account
}

message CancelOrderRequest {
  string order_id = 1;              // UUID
  string client_order_id = 2;       // alternative lookup key
  string account_id = 3;            // UUID — for authorization
}

message CancelAllOrdersRequest {
  string account_id = 1;            // UUID
  string instrument_id = 2;         // UUID; optional — empty = all instruments
  Side side = 3;                    // optional — 0 = both sides
}

message CancelAllOrdersResponse {
  uint32 cancelled_count = 1;
  repeated string cancelled_order_ids = 2;
}

message ModifyOrderRequest {
  string order_id = 1;              // UUID of the order to modify
  string account_id = 2;            // UUID — for authorization
  string new_price = 3;             // decimal string; empty = keep current
  uint64 new_quantity = 4;          // 0 = keep current
}

message GetOrderRequest {
  string order_id = 1;
  string account_id = 2;
}

message GetOpenOrdersRequest {
  string account_id = 1;
  string instrument_id = 2;         // optional filter
  Side side = 3;                    // optional filter
  uint32 limit = 4;                 // max results; default 100
  string cursor = 5;                // pagination cursor
}

message GetOpenOrdersResponse {
  repeated OrderDetail orders = 1;
  string next_cursor = 2;
}

message OrderDetail {
  string order_id = 1;
  string client_order_id = 2;
  string instrument_id = 3;
  string account_id = 4;
  string participant_id = 5;
  Side side = 6;
  OrderType order_type = 7;
  TimeInForce time_in_force = 8;
  string price = 9;
  string stop_price = 10;
  uint64 quantity = 11;
  uint64 filled_qty = 12;
  uint64 remaining_qty = 13;
  OrderStatus status = 14;
  google.protobuf.Timestamp created_at = 15;
  google.protobuf.Timestamp updated_at = 16;
  google.protobuf.Timestamp expire_at = 17;
}

// ---------------------------------------------------------------------------
// Execution Report
// ---------------------------------------------------------------------------

message ExecutionReport {
  string exec_id = 1;
  string order_id = 2;
  string client_order_id = 3;
  ExecType exec_type = 4;
  OrderStatus order_status = 5;
  Side side = 6;
  string instrument_id = 7;
  string price = 8;                  // order price
  uint64 quantity = 9;               // order quantity
  uint64 last_qty = 10;             // fill quantity (0 if not a fill)
  string last_price = 11;           // fill price
  uint64 cumulative_qty = 12;       // total filled
  uint64 leaves_qty = 13;           // remaining
  string trade_id = 14;             // UUID; set only for fills
  google.protobuf.Timestamp transact_time = 15;
  string reject_reason = 16;        // set only for REJECTED
  string account_id = 17;
}

// ---------------------------------------------------------------------------
// Trade Messages
// ---------------------------------------------------------------------------

message Trade {
  string trade_id = 1;
  string instrument_id = 2;
  string buy_order_id = 3;
  string sell_order_id = 4;
  string buyer_participant_id = 5;
  string seller_participant_id = 6;
  string price = 7;                  // decimal string
  uint64 quantity = 8;               // in lots
  string trade_value = 9;           // decimal string
  Side aggressor_side = 10;
  TradeType trade_type = 11;
  uint64 sequence_number = 12;
  google.protobuf.Timestamp executed_at = 13;
}

// ---------------------------------------------------------------------------
// Market Data Messages
// ---------------------------------------------------------------------------

message GetOrderBookRequest {
  string instrument_id = 1;
  uint32 depth = 2;                  // number of price levels; default 10
}

message PriceLevel {
  string price = 1;
  uint64 quantity = 2;               // total quantity at this level
  uint32 order_count = 3;
}

message OrderBookSnapshot {
  string instrument_id = 1;
  repeated PriceLevel bids = 2;
  repeated PriceLevel asks = 3;
  string last_trade_price = 4;
  uint64 sequence_number = 5;
  BookState state = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message L3Order {
  string order_id = 1;
  string price = 2;
  uint64 quantity = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message OrderBookSnapshotL3 {
  string instrument_id = 1;
  repeated L3Order bids = 2;
  repeated L3Order asks = 3;
  string last_trade_price = 4;
  uint64 sequence_number = 5;
  BookState state = 6;
  google.protobuf.Timestamp timestamp = 7;
}

message OrderBookUpdate {
  string instrument_id = 1;
  uint64 sequence_number = 2;
  repeated PriceLevelUpdate updates = 3;
  google.protobuf.Timestamp timestamp = 4;
}

message PriceLevelUpdate {
  Side side = 1;
  string price = 2;
  uint64 quantity = 3;               // new total qty; 0 = level removed
  uint32 order_count = 4;
}

message StreamTradesRequest {
  string instrument_id = 1;
  uint64 since_sequence = 2;         // replay from this sequence (0 = live only)
}

message StreamOrderBookRequest {
  string instrument_id = 1;
  bool snapshot_first = 2;           // send full snapshot before incremental updates
}

message GetLastTradeRequest {
  string instrument_id = 1;
}

// ---------------------------------------------------------------------------
// Admin Messages
// ---------------------------------------------------------------------------

message HaltInstrumentRequest {
  string instrument_id = 1;
  string reason = 2;
}

message HaltInstrumentResponse {
  string instrument_id = 1;
  BookState previous_state = 2;
  BookState current_state = 3;
  google.protobuf.Timestamp halted_at = 4;
}

message ResumeInstrumentRequest {
  string instrument_id = 1;
  bool trigger_auction = 2;          // default true
}

message ResumeInstrumentResponse {
  string instrument_id = 1;
  BookState current_state = 2;
  google.protobuf.Timestamp resumed_at = 3;
}

message BustTradeRequest {
  string trade_id = 1;
  string reason = 2;
}

message SetCircuitBreakerRequest {
  string instrument_id = 1;
  CircuitBreakerConfig config = 2;
}

message CircuitBreakerConfig {
  string instrument_id = 1;
  string level1_pct = 2;            // e.g. "5.00"
  uint32 level1_halt_minutes = 3;
  string level2_pct = 4;            // e.g. "10.00"
  uint32 level2_halt_minutes = 5;
  string level3_pct = 6;            // e.g. "15.00" — halts for remainder of session
}

message DisableParticipantRequest {
  string participant_id = 1;
  string reason = 2;
}

message DisableParticipantResponse {
  string participant_id = 1;
  uint32 cancelled_order_count = 2;
  google.protobuf.Timestamp disabled_at = 3;
}

message MassCancelRequest {
  string instrument_id = 1;         // optional
  string participant_id = 2;        // optional; at least one must be set
  string reason = 3;
}

message MassCancelResponse {
  uint32 cancelled_count = 1;
}
