name: Deploy to EKS

# GUARDED: cluster deploy is not part of the CI build+test gate. The automatic
# workflow_run trigger (deploy-on-image-build) is disabled; this runs only on
# manual dispatch, and each deploy/promotion job additionally requires GitHub
# environment approval. Re-enable the workflow_run trigger in a dedicated deploy
# task when ready.
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - staging
          - prod
      service:
        description: "Service to deploy (blank = all)"
        required: false
        type: string
      image_tag:
        description: "Image tag to deploy"
        required: true
        type: string

env:
  AWS_REGION: ap-northeast-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-1.amazonaws.com
  IMAGE_PREFIX: garudax-platform
  EKS_CLUSTER_PREFIX: garudax-platform

permissions:
  id-token: write
  contents: read

jobs:
  determine-target:
    name: Determine deployment target
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.target.outputs.environment }}
      image_tag: ${{ steps.target.outputs.image_tag }}
    steps:
      - name: Set target
        id: target
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "environment=${{ inputs.environment }}" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "main" ]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.workflow_run.head_branch }}" = "develop" ]; then
            echo "environment=dev" >> "$GITHUB_OUTPUT"
            echo "image_tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to ${{ needs.determine-target.outputs.environment }}
    needs: determine-target
    if: |
      (github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    environment: ${{ needs.determine-target.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER_PREFIX }}-${{ needs.determine-target.outputs.environment }} \
            --region ${{ env.AWS_REGION }}

      - name: Deploy services
        env:
          ENV: ${{ needs.determine-target.outputs.environment }}
          TAG: ${{ needs.determine-target.outputs.image_tag }}
        run: |
          SERVICES="${{ inputs.service }}"
          if [ -z "$SERVICES" ]; then
            # Deploy all services that have k8s manifests
            SERVICES=$(ls -d deploy/k8s/base/*/  2>/dev/null | xargs -I{} basename {} || true)
          fi

          for svc in $SERVICES; do
            echo "::group::Deploying ${svc} to ${ENV}"

            MANIFEST_DIR="deploy/k8s/overlays/${ENV}"
            if [ ! -d "$MANIFEST_DIR" ]; then
              echo "No overlay found for ${ENV}, skipping ${svc}"
              echo "::endgroup::"
              continue
            fi

            # Apply kustomize overlay with image tag substitution
            if command -v kustomize &> /dev/null; then
              cd deploy/k8s/overlays/${ENV}
              kustomize edit set image \
                "${ECR_REGISTRY}/${IMAGE_PREFIX}/${svc}:${TAG}"
              kustomize build . | kubectl apply -f -
              cd -
            else
              kubectl set image deployment/${svc} \
                ${svc}=${ECR_REGISTRY}/${IMAGE_PREFIX}/${svc}:${TAG} \
                -n garudax-platform || echo "Deployment ${svc} not found, skipping"
            fi

            # Wait for rollout
            kubectl rollout status deployment/${svc} \
              -n garudax-platform \
              --timeout=300s || {
                echo "::error::Rollout failed for ${svc}"
                kubectl rollout undo deployment/${svc} -n garudax-platform
                exit 1
              }

            echo "::endgroup::"
          done

      - name: Verify deployment health
        env:
          ENV: ${{ needs.determine-target.outputs.environment }}
        run: |
          echo "Checking pod health in garudax-platform namespace..."
          kubectl get pods -n garudax-platform -o wide
          # Fail if any pods are in CrashLoopBackOff
          UNHEALTHY=$(kubectl get pods -n garudax-platform --field-selector=status.phase!=Running,status.phase!=Succeeded -o name 2>/dev/null || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "::warning::Unhealthy pods detected: ${UNHEALTHY}"
          fi

  # NOTE: the previous `promote-staging` / `promote-prod` jobs were removed.
  # They gated on `github.event.workflow_run.head_branch == 'main'`, a context
  # that can never be set now that this workflow is `workflow_dispatch`-only —
  # so they were permanently unreachable (dead) jobs. To deploy a non-dev
  # environment, dispatch this workflow directly with `environment: staging` or
  # `environment: prod` (the `deploy` job + its `environment:` approval gate
  # handle every target). Re-introduce an automated promotion chain in a
  # dedicated deploy task when the cloud pipeline is intentionally re-enabled.
