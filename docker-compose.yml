###############################################################################
# ACE Platform — Local Development Environment
#
# Usage:
#   docker compose up -d              # Start infrastructure services
#   docker compose ps                 # Check service status
#   docker compose logs -f ace-postgres  # Follow logs for a service
#   docker compose down               # Stop all services
#   docker compose down -v            # Stop and destroy volumes
###############################################################################

services:

  # ── Infrastructure ───────────────────────────────────────────────────

  ace-postgres:
    image: postgres:15
    container_name: ace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ace_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ace_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ace_platform}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ace-pg-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ace_admin} -d ${POSTGRES_DB:-ace_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ace-net

  ace-redis:
    image: redis:7-alpine
    container_name: ace-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ace-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ace-net

  ace-kafka:
    image: apache/kafka:3.7.0
    container_name: ace-kafka
    environment:
      # KRaft mode (built-in, no Zookeeper)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@ace-kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://ace-kafka:9092,EXTERNAL://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Performance
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      # Cluster ID for KRaft
      CLUSTER_ID: "ace-local-dev-cluster-001"
    ports:
      - "${KAFKA_PORT:-9094}:9094"
    volumes:
      - ace-kafka-data:/tmp/kraft-combined-logs
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ace-net

  ace-kafka-init:
    image: apache/kafka:3.7.0
    container_name: ace-kafka-init
    depends_on:
      ace-kafka:
        condition: service_healthy
    volumes:
      - ./infrastructure/docker/kafka/create-topics.sh:/create-topics.sh:ro
    entrypoint: ["/bin/bash", "/create-topics.sh"]
    networks:
      - ace-net

