version: "3.9"

x-common-env: &common-env
  KAFKA_BROKERS: kafka:9092
  BIND_ADDRESS: "0.0.0.0"

x-healthcheck-http: &healthcheck-http
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  # ─── Infrastructure ───────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: ace-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ace}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ace_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-ace}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ace}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - ace-network

  redis:
    image: redis:7-alpine
    container_name: ace-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ace-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ace-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - ace-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ace-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - ace-network

  # ─── Exchange Core (engines) ───────────────────────────────────────

  matching-engine:
    build:
      context: ./src/matching-engine
      dockerfile: Dockerfile
    container_name: ace-matching-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50051"
      HEALTH_PORT: "8081"
      INSTRUMENTS: ${INSTRUMENTS:-WHT-HRW-2026M07-UB}
    ports:
      - "50051:50051"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  clearing-engine:
    build:
      context: ./src/clearing-engine
      dockerfile: Dockerfile
    container_name: ace-clearing-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50052"
      HEALTH_PORT: "8082"
      MATCHING_ENGINE_ADDR: matching-engine:50051
    ports:
      - "50052:50052"
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  margin-engine:
    build:
      context: ./src/margin-engine
      dockerfile: Dockerfile
    container_name: ace-margin-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50053"
      HEALTH_PORT: "8083"
      CLEARING_ENGINE_ADDR: clearing-engine:50052
    ports:
      - "50053:50053"
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  settlement-engine:
    build:
      context: ./src/settlement-engine
      dockerfile: Dockerfile
    container_name: ace-settlement-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50054"
      HEALTH_PORT: "8084"
      CLEARING_ENGINE_ADDR: clearing-engine:50052
    ports:
      - "50054:50054"
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  # ─── Supporting Services ───────────────────────────────────────────

  auth-service:
    build:
      context: ./src/auth-service
      dockerfile: Dockerfile
    container_name: ace-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50055"
      HEALTH_PORT: "8085"
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:-ace-dev-jwt-signing-key-change-in-production}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-ace}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ace_dev_password}
      DB_NAME: ${POSTGRES_DB:-ace}
      DB_SSL_MODE: disable
    ports:
      - "50055:50055"
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  compliance-service:
    build:
      context: ./src/compliance-service
      dockerfile: Dockerfile
    container_name: ace-compliance-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50056"
      HEALTH_PORT: "8086"
    ports:
      - "50056:50056"
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  market-data-service:
    build:
      context: ./src/market-data-service
      dockerfile: Dockerfile
    container_name: ace-market-data-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50057"
      HEALTH_PORT: "8087"
      INSTRUMENTS: ${INSTRUMENTS:-WHT-HRW-2026M07-UB}
    ports:
      - "50057:50057"
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  warehouse-service:
    build:
      context: ./src/warehouse-service
      dockerfile: Dockerfile
    container_name: ace-warehouse-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50058"
      HEALTH_PORT: "8088"
    ports:
      - "50058:50058"
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  # ─── API Gateway ───────────────────────────────────────────────────

  gateway:
    build:
      context: ./src/gateway
      dockerfile: Dockerfile
    container_name: ace-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
      margin-engine:
        condition: service_healthy
      settlement-engine:
        condition: service_healthy
      compliance-service:
        condition: service_healthy
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      HEALTH_PORT: "8090"
      JWT_SECRET: ${AUTH_JWT_SIGNING_KEY:-ace-dev-jwt-signing-key-change-in-production}
      JWT_ISSUER: "none"
      JWT_AUDIENCE: "none"
      MATCHING_ENGINE_ADDR: matching-engine:50051
      CLEARING_ENGINE_ADDR: clearing-engine:50052
      MARGIN_ENGINE_ADDR: margin-engine:50053
      SETTLEMENT_ENGINE_ADDR: settlement-engine:50054
      AUTH_SERVICE_ADDR: auth-service:50055
      COMPLIANCE_SERVICE_ADDR: compliance-service:50056
      MARKET_DATA_SERVICE_ADDR: market-data-service:50057
      WAREHOUSE_SERVICE_ADDR: warehouse-service:50058
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
      <<: *healthcheck-http
    networks:
      - ace-network

  # ─── Frontend UIs ──────────────────────────────────────────────────

  web-ui:
    build:
      context: ./src/web-ui
      dockerfile: Dockerfile
    container_name: ace-web-ui
    ports:
      - "${WEB_UI_PORT:-13000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      <<: *healthcheck-http
    networks:
      - ace-network

  admin-ui:
    build:
      context: ./src/admin-ui
      dockerfile: Dockerfile
    container_name: ace-admin-ui
    ports:
      - "${ADMIN_UI_PORT:-13001}:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      <<: *healthcheck-http
    networks:
      - ace-network

  demo-runner:
    build:
      context: ./src/demo-runner
      dockerfile: Dockerfile
    container_name: ace-demo-runner
    ports:
      - "${DEMO_PORT:-13002}:3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/"]
      <<: *healthcheck-http
    networks:
      - ace-network

  # ─── Reverse Proxy ────────────────────────────────────────────────

  # nginx reverse proxy disabled — using system nginx on this server
  # To enable: uncomment and ensure ports 80/443 are available
  # nginx:
  #   image: nginx:alpine
  #   container_name: ace-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
    driver: local
  kafkadata:
    driver: local

networks:
  ace-network:
    driver: bridge
