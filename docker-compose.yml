version: "3.9"

x-common-env: &common-env
  KAFKA_BROKERS: kafka:9092
  BIND_ADDRESS: "0.0.0.0"

x-healthcheck-http: &healthcheck-http
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 15s

services:
  # ─── Infrastructure ───────────────────────────────────────────────

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: garudax-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-garudax}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-garudax_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-garudax}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infrastructure/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-garudax}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - garudax-network

  redis:
    image: redis:7-alpine
    container_name: garudax-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - garudax-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: garudax-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat"
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc localhost 2181 | grep Zookeeper"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - garudax-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: garudax-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - garudax-network

  # ─── Exchange Core (engines) ───────────────────────────────────────

  matching-engine:
    build:
      context: ./src
      dockerfile: matching-engine/Dockerfile
    container_name: garudax-matching-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50051"
      HEALTH_PORT: "8081"
      INSTRUMENTS: ${INSTRUMENTS:-WHT-HRW-2026M07-UB}
    ports:
      - "50051:50051"
      - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  clearing-engine:
    build:
      context: ./src
      dockerfile: clearing-engine/Dockerfile
    container_name: garudax-clearing-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50052"
      HEALTH_PORT: "8082"
      MATCHING_ENGINE_ADDR: matching-engine:50051
    ports:
      - "50052:50052"
      - "8082:8082"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  margin-engine:
    build:
      context: ./src
      dockerfile: margin-engine/Dockerfile
    container_name: garudax-margin-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50053"
      HEALTH_PORT: "8083"
      CLEARING_ENGINE_ADDR: clearing-engine:50052
    ports:
      - "50053:50053"
      - "8083:8083"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  settlement-engine:
    build:
      context: ./src
      dockerfile: settlement-engine/Dockerfile
    container_name: garudax-settlement-engine
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50054"
      HEALTH_PORT: "8084"
      CLEARING_ENGINE_ADDR: clearing-engine:50052
    ports:
      - "50054:50054"
      - "8084:8084"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8084/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  # ─── Supporting Services ───────────────────────────────────────────

  auth-service:
    build:
      context: ./src/auth-service
      dockerfile: Dockerfile
    container_name: garudax-auth-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50055"
      HEALTH_PORT: "8085"
      AUTH_JWT_SIGNING_KEY: ${AUTH_JWT_SIGNING_KEY:-garudax-dev-jwt-signing-key-change-in-production}
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-garudax}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-garudax_dev_password}
      DB_NAME: ${POSTGRES_DB:-garudax}
      DB_SSL_MODE: disable
    ports:
      - "50055:50055"
      - "8085:8085"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  compliance-service:
    build:
      context: ./src
      dockerfile: compliance-service/Dockerfile
    container_name: garudax-compliance-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50056"
      HEALTH_PORT: "8086"
    ports:
      - "50056:50056"
      - "8086:8086"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8086/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  market-data-service:
    build:
      context: ./src
      dockerfile: market-data-service/Dockerfile
    container_name: garudax-market-data-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50057"
      HEALTH_PORT: "8087"
      INSTRUMENTS: ${INSTRUMENTS:-WHT-HRW-2026M07-UB}
    ports:
      - "50057:50057"
      - "8087:8087"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8087/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  warehouse-service:
    build:
      context: ./src
      dockerfile: warehouse-service/Dockerfile
    container_name: garudax-warehouse-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50058"
      HEALTH_PORT: "8088"
    ports:
      - "50058:50058"
      - "8088:8088"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8088/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  securities-service:
    build:
      context: ./src
      dockerfile: securities-service/Dockerfile
    container_name: garudax-securities-service
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      <<: *common-env
      GRPC_PORT: "50059"
      API_PORT: "8089"
      DATABASE_URL: "postgres://garudax:garudax_dev_password@postgres:5432/garudax?sslmode=disable"
      HEALTH_PORT: "9089"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-garudax}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-garudax_dev_password}
      DB_NAME: ${POSTGRES_DB:-garudax}
      DB_SSL_MODE: disable
    ports:
      - "50059:50059"
      - "8089:8089"
      - "9089:9089"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9089/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network
    restart: unless-stopped

  platform-service:
    build:
      context: ./src/platform-service
      dockerfile: Dockerfile
    container_name: garudax-platform-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
      API_PORT: "8095"
      HEALTH_PORT: "9095"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: ${POSTGRES_USER:-garudax}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-garudax_dev_password}
      DB_NAME: ${POSTGRES_DB:-garudax}
      DB_SSL_MODE: disable
    ports:
      - "8095:8095"
      - "9095:9095"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9095/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network
    restart: unless-stopped

  # ─── FIX Protocol Gateway ──────────────────────────────────────────

  fix-gateway:
    build:
      context: ./src
      dockerfile: fix-gateway/Dockerfile
    container_name: garudax-fix-gateway
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      gateway:
        condition: service_healthy
    environment:
      <<: *common-env
      FIX_LISTEN_ADDR: ":9878"
      FIX_ADMIN_ADDR: ":8091"
      FIX_HEALTH_ADDR: ":9091"
      FIX_TLS_REQUIRED: "false"
      FIX_TARGET_COMP_ID: "GARUDAX"
      LOG_LEVEL: "debug"
    ports:
      - "9878:9878"
      - "8091:8091"
      - "9091:9091"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  # ─── API Gateway ───────────────────────────────────────────────────

  gateway:
    build:
      context: ./src
      dockerfile: gateway/Dockerfile
    container_name: garudax-gateway
    depends_on:
      auth-service:
        condition: service_healthy
      matching-engine:
        condition: service_healthy
      clearing-engine:
        condition: service_healthy
      margin-engine:
        condition: service_healthy
      settlement-engine:
        condition: service_healthy
      compliance-service:
        condition: service_healthy
      platform-service:
        condition: service_healthy
    environment:
      <<: *common-env
      HTTP_PORT: "8080"
      HEALTH_PORT: "8090"
      JWT_SECRET: ${AUTH_JWT_SIGNING_KEY:-garudax-dev-jwt-signing-key-change-in-production}
      JWT_ISSUER: "none"
      JWT_AUDIENCE: "none"
      MATCHING_ENGINE_ADDR: matching-engine:50051
      CLEARING_ENGINE_ADDR: clearing-engine:50052
      MARGIN_ENGINE_ADDR: margin-engine:50053
      SETTLEMENT_ENGINE_ADDR: settlement-engine:50054
      AUTH_SERVICE_ADDR: auth-service:50055
      COMPLIANCE_SERVICE_ADDR: compliance-service:50056
      MARKET_DATA_SERVICE_ADDR: market-data-service:50057
      WAREHOUSE_SERVICE_ADDR: warehouse-service:50058
      SECURITIES_SERVICE_ADDR: securities-service:50059
      PLATFORM_SERVICE_ADDR: platform-service:8095
      FIX_GATEWAY_ADDR: fix-gateway:8091
      BOT_ORCHESTRATOR_URL: "http://admin-bot-orchestrator:3100"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8090/healthz"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  # ─── Frontend UIs ──────────────────────────────────────────────────

  web-ui:
    build:
      context: ./src/web-ui
      dockerfile: Dockerfile
    container_name: garudax-web-ui
    ports:
      - "${WEB_UI_PORT:-13000}:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  admin-ui:
    build:
      context: ./src/admin-ui
      dockerfile: Dockerfile
    container_name: garudax-admin-ui
    ports:
      - "${ADMIN_UI_PORT:-13001}:3001"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  demo-runner:
    build:
      context: ./src/demo-runner
      dockerfile: Dockerfile
    container_name: garudax-demo-runner
    ports:
      - "${DEMO_PORT:-13002}:3002"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3002/"]
      <<: *healthcheck-http
    networks:
      - garudax-network

  # ─── Bot Services ──────────────────────────────────────────────────

  admin-bot-orchestrator:
    build:
      context: ./src/admin-bot/orchestrator
      dockerfile: Dockerfile
    container_name: garudax-bot-orchestrator
    depends_on:
      gateway:
        condition: service_started
    environment:
      PORT: "3100"
      GARUDAX_GATEWAY_URL: "http://gateway:8080"
      GARUDAX_ADMIN_EMAIL: "${BOT_ADMIN_EMAIL:-admin@garudax.mn}"
      GARUDAX_ADMIN_PASSWORD: "${BOT_ADMIN_PASSWORD:-Adm1n@GarudaX!}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      MCP_SERVER_PATH: "/mcp/dist/index.js"
      BOT_DAILY_REPORT_HOUR: "9"
    volumes:
      - ./src/admin-bot/mcp-server:/mcp:ro
    ports:
      - "3100:3100"
    networks:
      - garudax-network
    restart: unless-stopped

  # ─── Architect Bot ────────────────────────────────────────────────

  architect-bot:
    build: src/architect-bot
    container_name: garudax-architect-bot
    ports:
      - "3010:3010"
    environment:
      - GEMINI_API_KEY=AIzaSyBTkTNskrYdKBT_bw9ihEWQHdbs3yUS290,AIzaSyD9jexozI5KV_gdya6E1GTUcx46hzflIX0
      - PORT=3010
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3010/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - garudax-network

  # ─── Reverse Proxy ────────────────────────────────────────────────

  # nginx reverse proxy disabled — using system nginx on this server
  # To enable: uncomment and ensure ports 80/443 are available
  # nginx:
  #   image: nginx:alpine
  #   container_name: garudax-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./infrastructure/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
    driver: local
  kafkadata:
    driver: local

networks:
  garudax-network:
    driver: bridge
